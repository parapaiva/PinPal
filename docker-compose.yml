services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pinpal
      POSTGRES_PASSWORD: pinpal
      POSTGRES_DB: pinpal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinpal"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: pinpal
      MONGO_INITDB_ROOT_PASSWORD: pinpal
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  mongodata:
